spring.application.name=API_Server

# Local PostgreSQL Database Configuration
spring.datasource.local.url=jdbc:postgresql://localhost:5432/marketmonitor
spring.datasource.local.username=sunny
spring.datasource.local.password=${DB_PASSWORD}
spring.datasource.local.driver-class-name=org.postgresql.Driver

# Supabase PostgreSQL Database Configuration (session mode pooler)
spring.datasource.supabase.url=jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:6543/postgres?prepareThreshold=0&tcpKeepAlive=true&socketTimeout=30
spring.datasource.supabase.username=postgres.latqdamkyjttyleplqzj
spring.datasource.supabase.password=${SUPABASE_PASSWORD}
spring.datasource.supabase.driver-class-name=org.postgresql.Driver

# JPA Configuration (applied per-datasource in config classes)
spring.jpa.open-in-view=false

# Azure Function URL
azure.function.url=https://market-data-ingestion.azurewebsites.net/api/MarketDataFunction
azure.function.base-url=https://market-data-ingestion.azurewebsites.net/api

# WebClient timeout settings (milliseconds)
webclient.timeout.connect=5000
webclient.timeout.read=10000

# Cache configuration (60 seconds TTL, max 100 entries)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=60s

# Circuit Breaker configuration
resilience4j.circuitbreaker.instances.marketData.slidingWindowSize=10
resilience4j.circuitbreaker.instances.marketData.failureRateThreshold=50
resilience4j.circuitbreaker.instances.marketData.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.marketData.permittedNumberOfCallsInHalfOpenState=3

resilience4j.circuitbreaker.instances.historicalData.slidingWindowSize=10
resilience4j.circuitbreaker.instances.historicalData.failureRateThreshold=50
resilience4j.circuitbreaker.instances.historicalData.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.historicalData.permittedNumberOfCallsInHalfOpenState=3

resilience4j.circuitbreaker.instances.gammaExposure.slidingWindowSize=10
resilience4j.circuitbreaker.instances.gammaExposure.failureRateThreshold=50
resilience4j.circuitbreaker.instances.gammaExposure.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.gammaExposure.permittedNumberOfCallsInHalfOpenState=3

# Retry configuration (retry transient DB connection failures with exponential backoff)
resilience4j.retry.instances.marketData.maxAttempts=3
resilience4j.retry.instances.marketData.waitDuration=500ms
resilience4j.retry.instances.marketData.enableExponentialBackoff=true
resilience4j.retry.instances.marketData.exponentialBackoffMultiplier=2

resilience4j.retry.instances.historicalData.maxAttempts=3
resilience4j.retry.instances.historicalData.waitDuration=500ms
resilience4j.retry.instances.historicalData.enableExponentialBackoff=true
resilience4j.retry.instances.historicalData.exponentialBackoffMultiplier=2

resilience4j.retry.instances.gammaExposure.maxAttempts=3
resilience4j.retry.instances.gammaExposure.waitDuration=500ms
resilience4j.retry.instances.gammaExposure.enableExponentialBackoff=true
resilience4j.retry.instances.gammaExposure.exponentialBackoffMultiplier=2

# Rate Limiter configuration (10 requests per second)
resilience4j.ratelimiter.instances.marketDataApi.limitForPeriod=10
resilience4j.ratelimiter.instances.marketDataApi.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.marketDataApi.timeoutDuration=0s
